<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini URL Shortener</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <h1>🔗 Mini URL Shortener</h1>
        <p>Paste your long URL below and get a short link instantly!</p>
        
        <div class="input-group">
            <input type="url" id="longUrl" placeholder="https://example.com/very/long/url" />
            <button id="shortenBtn">✨ Shorten URL</button>
        </div>
        
        <div id="result" class="result hidden">
            <h3>Your Short Link:</h3>
            <div class="short-link-container">
                <a id="shortLink" href="#" target="_blank"></a>
                <button id="copyBtn">📋 Copy</button>
            </div>
            <div class="stats">
                <p>📊 Clicks: <span id="clickCount">0</span></p>
                <p>🔗 Original: <span id="longUrlDisplay"></span></p>
            </div>
        </div>
        
        <div id="error" class="error hidden"></div>
    </div>
    
    <script src="/script.js"></script>
</body>
</html>
